name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Run analysis pipeline with retry
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            refresh_command="npm run pipeline:scheduled-analysis"
            refresh_mode="full scheduled analysis"
          else
            refresh_command="npm run pipeline:aisa-analysis"
            refresh_mode="AISA analysis"
          fi

          echo "Using ${refresh_mode}: ${refresh_command}"
          for attempt in 1 2 3; do
            echo "Pipeline attempt ${attempt}/3"
            if eval "${refresh_command}"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Pipeline failed on attempt ${attempt}. Retrying in 20 seconds..."
              sleep 20
            fi
          done
          echo "Pipeline failed after 3 attempts."
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aisa-analysis-artifacts
          if-no-files-found: warn
          path: |
            public/data/*.json
            public/reports
            public/downloads/clawHub/index.json
            public/downloads/github/index.json
            dist
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
